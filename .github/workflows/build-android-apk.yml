name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove invalid Gradle wrapper jar
        run: rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;34.0.0"

      - name: Install npm dependencies
        run: npm install

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: presence-badge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release and upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: apk-${{ github.run_number }}
        run: |
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk#presence-badge-debug.apk \
            --title "APK Build $TAG_NAME" \
            --notes "APK généré automatiquement depuis le commit ${{ github.sha }}" \
            --target "${{ github.sha }}"